<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>RPGST Dashboard</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/rpgst_logo.png" />
  <link rel="apple-touch-icon" href="/rpgst_logo.png" />

  <!-- Apply saved theme before first paint to prevent flash -->
  <script>
    (function () {
      var path = window.location.pathname || '/';
      var isWiki = path !== '/' && path !== '/index.html';
      var theme;
      if (isWiki) {
        // Public wiki always follows the viewer's browser theme preference.
        theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      } else {
        var mode = localStorage.getItem('themeMode') || 'dark';
        theme = mode === 'system'
          ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
          : mode;
      }
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>

  <!-- Critical splash styles (inline so the loader shows before app CSS/JS loads, with no white flash) -->
  <style>
    html[data-theme="dark"] {
      --splash-bg: #111111; --splash-fg: #f5f5f5; --splash-dim: #8a8a8a;
      --splash-track: #262626; --splash-accent: #4f8cff;
    }
    html[data-theme="light"] {
      --splash-bg: #f7f8fa; --splash-fg: #111111; --splash-dim: #8a8f99;
      --splash-track: #d8dbe2; --splash-accent: #4f8cff;
    }
    html, body { margin: 0; padding: 0; }
    body { background: var(--splash-bg); }
    .app-splash {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 26px; background: var(--splash-bg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      animation: splashFade 0.4s ease both;
    }
    .app-splash-logo {
      width: 64px; height: 64px; object-fit: contain;
      animation: splashPulse 1.8s ease-in-out infinite;
    }
    .app-splash-name {
      font-size: 14px; font-weight: 600; letter-spacing: 0.04em;
      color: var(--splash-fg);
    }
    .app-splash-bar {
      position: relative; width: 184px; height: 4px; border-radius: 4px;
      background: var(--splash-track); overflow: hidden;
    }
    .app-splash-bar::after {
      content: ""; position: absolute; top: 0; left: -40%; height: 100%; width: 40%;
      border-radius: 4px; background: var(--splash-accent);
      animation: splashSlide 1.15s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }
    @keyframes splashSlide { 0% { left: -40%; } 100% { left: 100%; } }
    @keyframes splashPulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.65; transform: scale(0.96); } }
    @keyframes splashFade { from { opacity: 0; } to { opacity: 1; } }
    @media (prefers-reduced-motion: reduce) {
      .app-splash-logo, .app-splash, .app-splash-bar::after { animation: none; }
    }
  </style>
</head>
<body>
  <div id="root">
    <!-- Shown instantly until React mounts; replaced on first render. Themed via data-theme above. -->
    <div class="app-splash">
      <img class="app-splash-logo" src="/rpgst_logo.png" alt="" />
      <div class="app-splash-name">RPG Story Toolkit</div>
      <div class="app-splash-bar"></div>
    </div>
  </div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
